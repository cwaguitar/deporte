<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jose Guitar | Elite Academy Sound</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #111827; --text: #ffffff; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 180px; overflow-x: hidden; }

        /* HEADER Y PROGRESO */
        .top-nav { width: 100%; background: #000; padding: 15px 20px; display: none; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .progress-container { width: 50%; background: #222; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* CONTENIDO */
        #app-content { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #1f2937; margin-bottom: 20px; }
        
        /* DIAGRAMA INTERACTIVO */
        .fretboard-v { 
            width: 200px; height: 300px; background: #1a1a1a; position: relative; border-top: 8px solid #ddd; 
            display: flex; justify-content: space-between; padding: 0 15px; overflow: hidden; margin: 0 auto;
        }
        .fret-line { position: absolute; left: 0; width: 100%; height: 2px; background: #333; z-index: 1; }
        .fl-1 { top: 75px; } .fl-2 { top: 150px; } .fl-3 { top: 225px; } .fl-4 { top: 298px; }
        .string-v { width: 3px; background: linear-gradient(to right, #444, #888, #444); height: 100%; position: relative; z-index: 2; cursor: pointer; }
        
        .finger { 
            width: 32px; height: 32px; background: var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10; display: flex; align-items: center; justify-content: center; color: #000; font-size: 12px; font-weight: 900; 
            cursor: pointer; box-shadow: 0 0 10px rgba(251,191,36,0.4); transition: transform 0.1s;
        }
        .finger:active { transform: translate(-50%, -50%) scale(1.3); background: #fff; }
        
        .status-mark { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 14px; cursor: pointer; padding: 5px; }

        /* NAVEGACIÓN */
        .nav-buttons { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 30%); padding: 30px 20px; display: none; gap: 10px; z-index: 100; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; flex: 2; font-size: 0.9rem; }
        .btn-prev { background: #374151; color: #fff; border: none; padding: 20px; border-radius: 15px; font-weight: 700; cursor: pointer; flex: 1; }

        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), url('portada.JPG') center/cover; text-align: center; }
        input { width: 80%; max-width: 300px; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="font-family:'Syncopate'; color:var(--primary)">JOSE GUITAR</h1>
    <input type="password" id="pass-input" placeholder="PASSCODE">
    <button class="btn-main" style="width:80%; max-width:300px" onclick="login()">ENTRAR</button>
</div>

<div class="top-nav" id="top-nav">
    <div id="day-label" style="font-weight:900">INTRO</div>
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    <div style="font-weight:900; color:var(--primary)">🔥</div>
</div>

<div id="app-content"></div>

<div class="nav-buttons" id="nav-buttons">
    <button class="btn-prev" id="btn-back" onclick="prevLesson()">VOLVER</button>
    <button class="btn-main" onclick="nextLesson()">SIGUIENTE ✓</button>
</div>

<script>
    const PASS = "GUITARRA1";
    let currentStep = 0;

    // AUDIO ENGINE
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Frecuencias base cuerdas: E2, A2, D3, G3, B3, E4
    const stringFrequencies = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63];

    function playNote(stringIndex, fret) {
        if (fret === "X") return;
        
        // Calcular frecuencia: F = f0 * 2^(n/12)
        const freq = stringFrequencies[stringIndex] * Math.pow(2, fret / 12);
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle'; // Sonido más parecido a cuerda de nylon
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    const curso = [
        {
            t: "CÓMO USAR ESTA APP",
            cat: "intro",
            goal: "Fundamentos",
            d: "Toca los puntos amarillos o las 'O' en el mástil para escuchar cómo debe sonar cada cuerda del acorde."
        },
        { t: "La Mayor (A)", goal: "Día 1", cat: "chord", p: ["X", 0, 2, 2, 2, 0] },
        { t: "Re Mayor (D)", goal: "Día 2", cat: "chord", p: ["X", "X", 0, 2, 3, 2] },
        { t: "Mi Mayor (E)", goal: "Día 3", cat: "chord", p: [0, 2, 2, 1, 0, 0] },
        { t: "Sol Mayor (G)", goal: "Día 4", cat: "chord", p: [3, 2, 0, 0, 3, 3] },
        { t: "Do Mayor (C)", goal: "Día 5", cat: "chord", p: ["X", 3, 2, 0, 1, 0] }
    ];

    function render() {
        const step = curso[currentStep];
        const content = document.getElementById('app-content');
        document.getElementById('p-bar').style.width = `${(currentStep / (curso.length - 1)) * 100}%`;
        document.getElementById('day-label').innerText = currentStep === 0 ? "INTRO" : `DÍA ${currentStep}`;
        document.getElementById('btn-back').style.visibility = currentStep === 0 ? "hidden" : "visible";

        let html = `
            <div class="card">
                <div style="font-size:0.7rem; font-weight:900; color:var(--success)">${step.goal}</div>
                <h2 style="font-family:'Syncopate'; color:var(--primary); margin:10px 0">${step.t}</h2>
                <p style="font-size:0.9rem; opacity:0.8">${step.d || "Escucha y practica la posición."}</p>
            </div>
        `;

        if (step.cat === "chord") {
            html += `
                <div class="card">
                    <div class="fretboard-v">
                        <div class="fret-line fl-1"></div><div class="fret-line fl-2"></div><div class="fret-line fl-3"></div><div class="fret-line fl-4"></div>
                        ${[0,1,2,3,4,5].map(i => `<div class="string-v" id="str${i}"></div>`).join('')}
                    </div>
                    <p style="text-align:center; font-size:0.8rem; margin-top:15px; color:var(--primary)">¡Toca los puntos para escuchar la nota!</p>
                </div>
            `;
        }

        content.innerHTML = html;
        if(step.cat === "chord") drawChord(step.p);
    }

    function drawChord(p) {
        p.forEach((val, i) => {
            const str = document.getElementById(`str${i}`);
            if (val === "X") {
                str.innerHTML = `<span class="status-mark" style="color:#ef4444">X</span>`;
            } else if (val === 0) {
                str.innerHTML = `<span class="status-mark" style="color:var(--primary)" onclick="playNote(${i}, 0)">O</span>`;
            } else if (typeof val === 'number') {
                const pos = (val * 75) - 37;
                str.innerHTML = `<div class="finger" style="top:${pos}px" onclick="playNote(${i}, ${val})">${val}</div>`;
            }
        });
    }

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === PASS) {
            audioCtx.resume(); // Activar audio tras interacción
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
            document.getElementById('nav-buttons').style.display = 'flex';
            render();
        }
    }

    function nextLesson() { if(currentStep < curso.length - 1) { currentStep++; render(); } }
    function prevLesson() { if(currentStep > 0) { currentStep--; render(); } }
</script>
</body>
</html>
