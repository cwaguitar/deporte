<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Guitar | Elite Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #10141d; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 150px; }
        
        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; text-align: center; }
        .hero-logo { font-family: 'Syncopate', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 20px; }
        
        .top-nav { width: 100%; background: #000; padding: 15px 0; display: none; justify-content: center; gap: 20px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 99; }
        .stat-item { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }

        #app-content { display: none; width: 90%; max-width: 450px; margin: 20px auto; }

        /* MÁSTIL VERTICAL ELITE */
        .fretboard-container { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #222;
            display: flex; flex-direction: column; align-items: center;
        }
        .fretboard-vertical { 
            display: flex; background: #1a1a1a; padding: 10px; border-radius: 5px; 
            border-top: 6px solid #ddd; /* La cejuela */
            position: relative; width: 180px; justify-content: space-between;
        }
        .string-v { width: 2px; background: #444; height: 220px; position: relative; display: flex; flex-direction: column; }
        .fret-line { position: absolute; width: 100%; height: 2px; background: #333; left: 0; }
        
        /* Posiciones de los trastes */
        .f1 { top: 44px; } .f2 { top: 88px; } .f3 { top: 132px; } .f4 { top: 176px; }

        .note-dot { 
            width: 24px; height: 24px; background: var(--primary); border-radius: 50%; 
            position: absolute; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10; display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 10px; font-weight: 900; box-shadow: 0 0 15px var(--primary);
        }
        .open-string { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: var(--primary); font-size: 12px; font-weight: 900; }
        .muted-string { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #ff4444; font-size: 12px; }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        .tab-display { font-family: monospace; background: #000; padding: 15px; border-radius: 10px; color: var(--primary); white-space: pre; font-size: 14px; margin: 10px 0; border: 1px solid #222; }
        
        .btn-glow { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="hero-logo">JOSE GUITAR</div>
    <input type="text" id="pass-input" placeholder="PASSCODE" style="padding:15px; border-radius:10px; border:none; text-align:center; margin-bottom:10px;">
    <button class="btn-glow" style="width:200px" onclick="login()">ENTRAR</button>
</div>

<div class="top-nav" id="top-nav">
    <div class="stat-item">🔥 DÍA <span id="streak-num">1</span></div>
    <div class="stat-item" style="color:var(--primary)">MODE: ELITE</div>
</div>

<div id="app-content">
    <div class="video-container">
        <iframe id="lesson-video" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <div class="fretboard-container">
        <span id="chord-name" style="font-family:'Syncopate'; color:var(--primary); margin-bottom:20px;">ACORDE</span>
        <div class="fretboard-vertical" id="fret-v">
            <div class="string-v" id="s0"><div class="fret-line f1"></div><div class="fret-line f2"></div><div class="fret-line f3"></div><div class="fret-line f4"></div></div>
            <div class="string-v" id="s1"><div class="fret-line f1"></div><div class="fret-line f2"></div><div class="fret-line f3"></div><div class="fret-line f4"></div></div>
            <div class="string-v" id="s2"><div class="fret-line f1"></div><div class="fret-line f2"></div><div class="fret-line f3"></div><div class="fret-line f4"></div></div>
            <div class="string-v" id="s3"><div class="fret-line f1"></div><div class="fret-line f2"></div><div class="fret-line f3"></div><div class="fret-line f4"></div></div>
            <div class="string-v" id="s4"><div class="fret-line f1"></div><div class="fret-line f2"></div><div class="fret-line f3"></div><div class="fret-line f4"></div></div>
            <div class="string-v" id="s5"><div class="fret-line f1"></div><div class="fret-line f2"></div><div class="fret-line f3"></div><div class="fret-line f4"></div></div>
        </div>
    </div>

    <div style="background:var(--card); padding:20px; border-radius:20px; border:1px solid #222;">
        <h3 id="lesson-title" style="margin:0; font-size:1.1rem;"></h3>
        <p id="lesson-desc" style="font-size:0.9rem; opacity:0.7;"></p>
        <div class="tab-display" id="tab-content"></div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav">
    <button class="btn-glow" id="next-btn" onclick="nextDay()">SIGUIENTE LECCIÓN</button>
</div>

<script>
    const ACCESS = "GUITARRA1";
    let currentDay = 0;

    // PLAN DE 30 DÍAS
    const plan = [
        // MAYORES (1-7)
        { t: "Do Mayor (C)", d: "C", p: ["X", 3, 2, 0, 1, 0], tab: "E|-0-|\nB|-1-|\nG|-0-|\nD|-2-|\nA|-3-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Re Mayor (D)", d: "D", p: ["X", "X", 0, 2, 3, 2], tab: "E|-2-|\nB|-3-|\nG|-2-|\nD|-0-|\nA|-X-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Mi Mayor (E)", d: "E", p: [0, 2, 2, 1, 0, 0], tab: "E|-0-|\nB|-0-|\nG|-1-|\nD|-2-|\nA|-2-|\nE|-0-|", v: "URL_VIDEO" },
        { t: "Fa Mayor (F)", d: "F (Cejilla)", p: [1, 3, 3, 2, 1, 1], tab: "E|-1-|\nB|-1-|\nG|-2-|\nD|-3-|\nA|-3-|\nE|-1-|", v: "URL_VIDEO" },
        { t: "Sol Mayor (G)", d: "G", p: [3, 2, 0, 0, 3, 3], tab: "E|-3-|\nB|-3-|\nG|-0-|\nD|-0-|\nA|-2-|\nE|-3-|", v: "URL_VIDEO" },
        { t: "La Mayor (A)", d: "A", p: ["X", 0, 2, 2, 2, 0], tab: "E|-0-|\nB|-2-|\nG|-2-|\nD|-2-|\nA|-0-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Si Mayor (B)", d: "B (Cejilla)", p: ["X", 2, 4, 4, 4, 2], tab: "E|-2-|\nB|-4-|\nG|-4-|\nD|-4-|\nA|-2-|\nE|-X-|", v: "URL_VIDEO" },
        
        // MENORES (8-14)
        { t: "Do Menor (Cm)", d: "Cm", p: ["X", 3, 5, 5, 4, 3], tab: "E|-3-|\nB|-4-|\nG|-5-|\nD|-5-|\nA|-3-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Re Menor (Dm)", d: "Dm", p: ["X", "X", 0, 2, 3, 1], tab: "E|-1-|\nB|-3-|\nG|-2-|\nD|-0-|\nA|-X-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Mi Menor (Em)", d: "Em", p: [0, 2, 2, 0, 0, 0], tab: "E|-0-|\nB|-0-|\nG|-0-|\nD|-2-|\nA|-2-|\nE|-0-|", v: "URL_VIDEO" },
        { t: "Fa Menor (Fm)", d: "Fm", p: [1, 3, 3, 1, 1, 1], tab: "E|-1-|\nB|-1-|\nG|-1-|\nD|-3-|\nA|-3-|\nE|-1-|", v: "URL_VIDEO" },
        { t: "Sol Menor (Gm)", d: "Gm", p: [3, 5, 5, 3, 3, 3], tab: "E|-3-|\nB|-3-|\nG|-3-|\nD|-5-|\nA|-5-|\nE|-3-|", v: "URL_VIDEO" },
        { t: "La Menor (Am)", d: "Am", p: ["X", 0, 2, 2, 1, 0], tab: "E|-0-|\nB|-1-|\nG|-2-|\nD|-2-|\nA|-0-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Si Menor (Bm)", d: "Bm", p: ["X", 2, 4, 4, 3, 2], tab: "E|-2-|\nB|-3-|\nG|-4-|\nD|-4-|\nA|-2-|\nE|-X-|", v: "URL_VIDEO" },

        // SEPTIMOS (15-21)
        { t: "Do Séptima (C7)", d: "C7", p: ["X", 3, 2, 3, 1, 0], tab: "E|-0-|\nB|-1-|\nG|-3-|\nD|-2-|\nA|-3-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Re Séptima (D7)", d: "D7", p: ["X", "X", 0, 2, 1, 2], tab: "E|-2-|\nB|-1-|\nG|-2-|\nD|-0-|\nA|-X-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Mi Séptima (E7)", d: "E7", p: [0, 2, 0, 1, 0, 0], tab: "E|-0-|\nB|-0-|\nG|-1-|\nD|-0-|\nA|-2-|\nE|-0-|", v: "URL_VIDEO" },
        { t: "Fa Séptima (F7)", d: "F7", p: [1, 3, 1, 2, 1, 1], tab: "E|-1-|\nB|-1-|\nG|-2-|\nD|-1-|\nA|-3-|\nE|-1-|", v: "URL_VIDEO" },
        { t: "Sol Séptima (G7)", d: "G7", p: [3, 2, 0, 0, 0, 1], tab: "E|-1-|\nB|-0-|\nG|-0-|\nD|-0-|\nA|-2-|\nE|-3-|", v: "URL_VIDEO" },
        { t: "La Séptima (A7)", d: "A7", p: ["X", 0, 2, 0, 2, 0], tab: "E|-0-|\nB|-2-|\nG|-0-|\nD|-2-|\nA|-0-|\nE|-X-|", v: "URL_VIDEO" },
        { t: "Si Séptima (B7)", d: "B7", p: ["X", 2, 1, 2, 0, 2], tab: "E|-2-|\nB|-0-|\nG|-2-|\nD|-1-|\nA|-2-|\nE|-X-|", v: "URL_VIDEO" },

        // CANCIONES Y EJERCICIOS (22-30)
        { t: "Independencia de Dedos", d: "Ejercicio 1-2-3-4", p: [1, 2, 3, 4, null, null], tab: "Subir y bajar por el mástil\ncuerda por cuerda.", v: "URL_VIDEO" },
        { t: "Canción Fácil: Knocking on Heaven's Door", d: "G - D - Am / G - D - C", p: [3, 2, 0, 0, 3, 3], tab: "G - D - Am\nG - D - C", v: "URL_VIDEO" },
        { t: "Riff: Smoke on the Water", d: "Power Chords", p: [null, null, 5, 5, null, null], tab: "D|--0--3--5---0--3--6--5--", v: "URL_VIDEO" }
    ];

    // Rellenar hasta 30
    while(plan.length < 30) {
        plan.push({ t: "Perfeccionamiento Elite", d: "Velocidad de cambio", p: [null, null, null, null, null, null], tab: "Practica los 21 acordes\nuno tras otro sin parar.", v: "" });
    }

    function drawChord(pattern) {
        // Limpiar puntos previos
        document.querySelectorAll('.note-dot, .open-string, .muted-string').forEach(e => e.remove());
        
        pattern.forEach((val, sIdx) => {
            const stringEl = document.getElementById(`s${sIdx}`);
            if (val === "X") {
                stringEl.innerHTML += `<span class="muted-string">X</span>`;
            } else if (val === 0) {
                stringEl.innerHTML += `<span class="open-string">O</span>`;
            } else if (val !== null) {
                // Ajustar posición visual según traste
                const topPos = (val * 44) - 22;
                stringEl.innerHTML += `<div class="note-dot" style="top:${topPos}px">${val}</div>`;
            }
        });
    }

    function updateUI() {
        const item = plan[currentDay];
        document.getElementById('streak-num').innerText = currentDay + 1;
        document.getElementById('lesson-title').innerText = item.t;
        document.getElementById('chord-name').innerText = item.d;
        document.getElementById('tab-content').innerText = item.tab;
        drawChord(item.p);
    }

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === ACCESS) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('bottom-nav').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
            updateUI();
        }
    }

    function nextDay() {
        if(currentDay < 29) {
            currentDay++;
            updateUI();
            window.scrollTo(0,0);
        }
    }
</script>
</body>
</html>
