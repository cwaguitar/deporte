<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jose Guitar | Elite Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #111827; --text: #ffffff; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* PORTADA LOGIN */
        #auth-screen { 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), url('portada.JPG') center/cover no-repeat;
            text-align: center; padding: 20px;
        }
        .hero-logo { font-family: 'Syncopate', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 5px; }
        .hero-tag { font-size: 0.7rem; letter-spacing: 4px; opacity: 0.8; margin-bottom: 30px; }
        
        .login-box { 
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 28px; 
            border: 1px solid rgba(251,191,36,0.2); backdrop-filter: blur(15px); 
            width: 100%; max-width: 320px; /* Tamaño controlado */
        }
        
        input { 
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; 
            background: #000; color: #fff; text-align: center; font-size: 1rem; margin-bottom: 15px; 
        }

        /* HEADER */
        .top-nav { width: 100%; background: #000; padding: 15px 20px; display: none; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .progress-container { width: 50%; background: #222; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* CONTENIDO */
        #app-content { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #1f2937; margin-bottom: 20px; }
        
        /* DIAGRAMA INTERACTIVO */
        .fretboard-v { 
            width: 180px; height: 260px; background: #1a1a1a; position: relative; border-top: 8px solid #ddd; 
            display: flex; justify-content: space-between; padding: 0 10px; overflow: hidden; margin: 20px auto;
        }
        .fret-line { position: absolute; left: 0; width: 100%; height: 2px; background: #333; z-index: 1; }
        .fl-1 { top: 65px; } .fl-2 { top: 130px; } .fl-3 { top: 195px; } .fl-4 { top: 255px; }
        .string-v { width: 2px; background: #444; height: 100%; position: relative; z-index: 2; }
        
        .finger { 
            width: 28px; height: 28px; background: var(--primary); border-radius: 50%; position: absolute; 
            left: 50%; transform: translate(-50%, -50%); z-index: 10; display: flex; 
            align-items: center; justify-content: center; color: #000; font-size: 11px; font-weight: 900; 
            cursor: pointer; box-shadow: 0 0 10px rgba(251,191,36,0.4);
        }
        .status-mark { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 12px; cursor: pointer; }

        /* BOTONES NAVEGACIÓN */
        .nav-buttons { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 30%); padding: 30px 20px; display: none; gap: 10px; z-index: 100; justify-content: center; }
        
        .btn-main { 
            background: var(--primary); color: #000; border: none; padding: 18px 25px; 
            border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; 
            font-size: 0.9rem; transition: 0.2s; max-width: 200px; /* Tamaño controlado */
        }
        .btn-prev { 
            background: #374151; color: #fff; border: none; padding: 18px 20px; 
            border-radius: 15px; font-weight: 700; cursor: pointer; font-size: 0.8rem;
        }
        .btn-main:active { transform: scale(0.95); }

        /* INTRO EXPLICACIÓN */
        .intro-step { margin-bottom: 20px; border-left: 3px solid var(--primary); padding-left: 15px; }
        .intro-step h4 { margin: 0; color: var(--primary); font-size: 0.9rem; }
        .intro-step p { margin: 5px 0 0 0; font-size: 0.85rem; opacity: 0.8; line-height: 1.4; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="hero-logo">JOSE GUITAR</div>
    <div class="hero-tag">ELITE ACADEMY 30</div>
    <div class="login-box">
        <input type="password" id="pass-input" placeholder="CÓDIGO DE ACCESO">
        <button class="btn-main" style="width:100%; max-width: none;" onclick="login()">ENTRAR</button>
    </div>
</div>

<div class="top-nav" id="top-nav">
    <div id="day-label" style="font-weight:900; font-size: 0.8rem;">
