<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jose Guitar | Elite Academy 30</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #111827; --text: #ffffff; --success: #10b981; --error: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 140px; }

        /* HEADER */
        .top-nav { width: 100%; background: #000; padding: 15px 20px; display: none; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .progress-container { width: 50%; background: #222; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* CONTENIDO */
        #app-content { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #1f2937; margin-bottom: 20px; }
        
        /* DIAGRAMA INTERACTIVO */
        .fretboard-v { 
            width: 180px; height: 260px; background: #1a1a1a; position: relative; border-top: 8px solid #ddd; 
            display: flex; justify-content: space-between; padding: 0 10px; overflow: hidden; margin: 20px auto;
        }
        .fret-line { position: absolute; left: 0; width: 100%; height: 2px; background: #333; z-index: 1; }
        .fl-1 { top: 65px; } .fl-2 { top: 130px; } .fl-3 { top: 195px; } .fl-4 { top: 255px; }
        .string-v { width: 2px; background: #444; height: 100%; position: relative; z-index: 2; }
        .finger { 
            width: 28px; height: 28px; background: var(--primary); border-radius: 50%; position: absolute; 
            left: 50%; transform: translate(-50%, -50%); z-index: 10; display: flex; 
            align-items: center; justify-content: center; color: #000; font-size: 11px; font-weight: 900; box-shadow: 0 0 10px rgba(251,191,36,0.4);
        }
        .status-mark { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 12px; }

        /* GUÍA DE FUNDAMENTOS */
        .guide-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .guide-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .guide-item h4 { margin: 0 0 8px 0; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; }
        .guide-item p { margin: 0; font-size: 0.75rem; opacity: 0.8; line-height: 1.4; }
        .circle-num { display: inline-flex; width: 18px; height: 18px; background: var(--primary); color: #000; border-radius: 50%; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; margin-right: 4px; }

        /* BOTONES */
        .nav-buttons { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 30%); padding: 30px 20px; display: none; gap: 10px; z-index: 100; justify-content: center; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 18px 25px; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; flex: 2; }
        .btn-prev { background: #374151; color: #fff; border: none; padding: 18px 20px; border-radius: 15px; font-weight: 700; cursor: pointer; font-size: 0.8rem; flex: 1; }

        #auth-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.6), var(--bg)), url('portada.JPG') center/cover; text-align: center; }
        input { width: 280px; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="font-family:'Syncopate'; font-size:1.8rem; color:var(--primary)">JOSE GUITAR</div>
    <div style="letter-spacing:4px; font-size:0.6rem; margin-bottom:30px; opacity:0.7">ELITE ACADEMY</div>
    <input type="password" id="pass-input" placeholder="CÓDIGO">
    <button class="btn-main" style="flex:none; width:280px" onclick="login()">ENTRAR</button>
</div>

<div class="top-nav" id="top-nav">
    <div id="day-label" style="font-weight:900; font-size:0.8rem">INTRO</div>
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    <div style="font-weight:900; color:var(--primary)">🔥</div>
</div>

<div id="app-content"></div>

<div class="nav-buttons" id="nav-buttons">
    <button class="btn-prev" id="btn-back" onclick="prevLesson()">ATRÁS</button>
    <button class="btn-main" onclick="nextLesson()">CONTINUAR ✓</button>
</div>

<script>
    const PASS = "GUITARRA1";
    let currentStep = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stringFrequencies = [82.41, 110.00, 146.83, 196.00, 246.94, 329.63];

    function playNote(stringIndex, fret) {
        if (fret === "X") return;
        const freq = stringFrequencies[stringIndex] * Math.pow(2, fret / 12);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
    }

    const curso = [
        {
            t: "GUÍA DE INICIO",
            cat: "intro",
            goal: "Fundamentos Elite",
            d: `
                <p style="font-size:0.9rem; opacity:0.8; margin-bottom:20px;">Bienvenido, Jose. Antes de tocar, domina estos 4 conceptos clave para usar la aplicación correctamente:</p>
                <div class="guide-grid">
                    <div class="guide-item">
                        <h4>🖐️ Los Dedos</h4>
                        <p><span class="circle-num">1</span> Índice<br><span class="circle-num">2</span> Medio<br><span class="circle-num">3</span> Anular<br><span class="circle-num">4</span> Meñique</p>
                    </div>
                    <div class="guide-item">
                        <h4>🎸 El Mástil</h4>
                        <p>Líneas verticales = Cuerdas.<br>Líneas horizontales = Trastes (espacios).</p>
                    </div>
                    <div class="guide-item">
                        <h4>🔘 Símbolos</h4>
                        <p><b style="color:var(--primary)">O</b>: Cuerda al aire.<br><b style="color:var(--error)">X</b>: No tocar esta cuerda.</p>
                    </div>
                    <div class="guide-item">
                        <h4>🔊 Interacción</h4>
                        <p>Toca los círculos naranjas en los diagramas para oír la nota real.</p>
                    </div>
                </div>
            `
        },
        { t: "La Mayor (A)", goal: "Día 1: Tu primer acorde", cat: "chord", p: ["X", 0, 2, 2, 2, 0], d: "Usa los dedos 1, 2 y 3. Mantenlos bien arqueados para que no rocen otras cuerdas." },
        { t: "Re Mayor (D)", goal: "Día 2: Forma de Triángulo", cat: "chord", p: ["X", "X", 0, 2, 3, 2], d: "Enfócate en la claridad. Si suena 'sordo', presiona con más fuerza cerca del traste." },
        { t: "Mi Mayor (E)", goal: "Día 3: El Poder", cat: "chord", p: [0, 2, 2, 1, 0, 0], d: "Este acorde usa las 6 cuerdas. Asegúrate de que todas vibren con libertad." }
    ];

    function render() {
        const step = curso[currentStep];
        const content = document.getElementById('app-content');
        document.getElementById('p-bar').style.width = `${(currentStep / (curso.length - 1)) * 100}%`;
        document.getElementById('day-label').innerText = currentStep === 0 ? "INTRO" : `DÍA ${currentStep}`;
        document.getElementById('btn-back').style.visibility = currentStep === 0 ? "hidden" : "visible";

        let html = `
            <div class="card">
                <div style="font-size:0.65rem; font-weight:900; color:var(--success); text-transform:uppercase; letter-spacing:1px;">${step.goal}</div>
                <h2 style="font-family:'Syncopate'; color:var(--primary); margin:10px 0; font-size:1.2rem;">${step.t}</h2>
                <div>${step.cat === 'intro' ? step.d : `<p style="opacity:0.8; font-size:0.9rem; line-height:1.5">${step.d}</p>`}</div>
            </div>
        `;

        if (step.cat === "chord") {
            html += `
                <div class="card" style="text-align:center;">
                    <div class="fretboard-v">
                        <div class="fret-line fl-1"></div><div class="fret-line fl-2"></div><div class="fret-line fl-3"></div><div class="fret-line fl-4"></div>
                        ${[0,1,2,3,4,5].map(i => `<div class="string-v" id="str${i}"></div>`).join('')}
                    </div>
                    <p style="color:var(--primary); font-size:0.65rem; font-weight:900; letter-spacing:1px; margin-top:10px;">🎧 TOCA LAS NOTAS PARA ESCUCHAR</p>
                </div>
            `;
        }

        content.innerHTML = html;
        if(step.cat === "chord") drawChord(step.p);
    }

    function drawChord(p) {
        p.forEach((val, i) => {
            const str = document.getElementById(`str${i}`);
            if (val === "X") {
                str.innerHTML = `<span class="status-mark" style="color:var(--error)">X</span>`;
            } else if (val === 0) {
                str.innerHTML = `<span class="status-mark" style="color:var(--primary)" onclick="playNote(${i}, 0)">O</span>`;
            } else if (typeof val === 'number') {
                const pos = (val * 65) - 32;
                str.innerHTML = `<div class="finger" style="top:${pos}px" onclick="playNote(${i}, ${val})">${val}</div>`;
            }
        });
    }

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === PASS) {
            audioCtx.resume();
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
            document.getElementById('nav-buttons').style.display = 'flex';
            render();
        } else { alert("CÓDIGO ERRÓNEO"); }
    }

    function nextLesson() { if(currentStep < curso.length - 1) { currentStep++; render(); } }
    function prevLesson() { if(currentStep > 0) { currentStep--; render(); } }
</script>
</body>
</html>
