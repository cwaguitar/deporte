<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jose Guitar | Elite Academy 30</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #111827; --text: #ffffff; --success: #10b981; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 180px; overflow-x: hidden; }

        /* PORTADA PREMIUM */
        #auth-screen { 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), var(--bg)), url('portada.JPG') center/cover no-repeat;
            text-align: center; padding: 20px;
        }
        .hero-logo { font-family: 'Syncopate', sans-serif; font-size: 2.2rem; color: var(--primary); text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hero-tag { font-size: 0.8rem; letter-spacing: 5px; opacity: 0.8; margin-bottom: 40px; text-transform: uppercase; }
        .login-box { background: rgba(255,255,255,0.05); padding: 35px; border-radius: 28px; border: 1px solid rgba(251,191,36,0.2); backdrop-filter: blur(15px); width: 100%; max-width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 1.1rem; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--primary); }

        /* HEADER & PROGRESO */
        .top-nav { width: 100%; background: #000; padding: 15px 20px; display: none; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .progress-container { width: 55%; background: #222; height: 10px; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #d97706, var(--primary)); width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .streak-badge { font-weight: 900; color: var(--primary); font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }

        /* CONTENIDO PRINCIPAL */
        #app-content { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .objective-box { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); padding: 18px; border-radius: 20px; margin-bottom: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 24px; overflow: hidden; border: 1px solid #333; margin-bottom: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        /* MÁSTIL VERTICAL PROFESIONAL */
        .fretboard-card { background: var(--card); border-radius: 28px; padding: 35px 15px; border: 1px solid #1f2937; display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; position: relative; }
        .fretboard-v { 
            width: 200px; height: 300px; background: #1a1a1a; position: relative; border-top: 10px solid #ccc; 
            display: flex; justify-content: space-between; padding: 0 12px; overflow: hidden; border-bottom: 4px solid #333;
        }
        .fret-line { position: absolute; left: 0; width: 100%; height: 2px; background: #444; z-index: 1; }
        .fl-1 { top: 75px; } .fl-2 { top: 150px; } .fl-3 { top: 225px; } .fl-4 { top: 298px; }
        .string-v { width: 2px; background: linear-gradient(to right, #444, #777, #444); height: 100%; position: relative; z-index: 2; }
        .finger { 
            width: 28px; height: 28px; background: var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10; display: flex; align-items: center; justify-content: center; color: #000; font-size: 11px; font-weight: 900; box-shadow: 0 0 15px rgba(251,191,36,0.6); 
        }
        .status-mark { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 14px; }

        /* RITMOS Y METRÓNOMO */
        .rhythm-card { background: var(--card); border-radius: 28px; padding: 30px; border: 1px solid #1f2937; text-align: center; margin-bottom: 25px; }
        .arrow-pattern { font-size: 2.2rem; color: var(--primary); letter-spacing: 12px; margin: 20px 0; font-weight: 900; }
        .metronome { display: flex; align-items: center; justify-content: center; gap: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 50px; margin-top: 20px; border: 1px solid #222; }
        .beat-dot { width: 14px; height: 14px; background: #333; border-radius: 50%; transition: 0.1s; }
        .active-beat { background: var(--primary); box-shadow: 0 0 15px var(--primary); transform: scale(1.2); }

        /* CHECKLIST */
        .checklist-container { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #1f2937; margin-top: 20px; }
        .check-item { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; margin: 12px 0; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .check-item input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary); }

        /* BOTONES */
        .btn-main { background: var(--primary); color: #000; border: none; padding: 22px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 50%); padding: 50px 20px 30px; display: none; z-index: 100; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="hero-logo">JOSE GUITAR</div>
    <div class="hero-tag">PROGRAMA ELITE 30 DÍAS</div>
    <div class="login-box">
        <input type="password" id="pass-input" placeholder="INTRODUCE TU CLAVE">
        <button class="btn-main" onclick="login()">INICIAR ENTRENAMIENTO</button>
    </div>
</div>

<div class="top-nav" id="top-nav">
    <div class="streak-badge">🔥 <span id="streak-val">1</span> DÍAS</div>
    <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    <div style="font-weight:900; font-size:0.8rem" id="day-label">DÍA 1</div>
</div>

<div id="app-content">
    <div class="objective-box">
        <div style="color:var(--success); font-weight:900; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">Meta del día:</div>
        <div id="daily-goal" style="font-weight:700; font-size:1.1rem; margin-top:5px; color:#fff;">Cargando...</div>
    </div>

    <div class="video-wrapper">
        <iframe id="main-video" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <div id="chord-view" class="fretboard-card">
        <h2 id="chord-title" style="margin:0 0 25px 0; font-family:'Syncopate'; color:var(--primary); font-size:1.3rem;">ACORDE</h2>
        <div class="fretboard-v">
            <div class="fret-line fl-1"></div><div class="fret-line fl-2"></div><div class="fret-line fl-3"></div><div class="fret-line fl-4"></div>
            <div class="string-v" id="str0"></div><div class="string-v" id="str1"></div><div class="string-v" id="str2"></div>
            <div class="string-v" id="str3"></div><div class="string-v" id="str4"></div><div class="string-v" id="str5"></div>
        </div>
        <div style="display:flex; justify-content:space-between; width:200px; margin-top:15px; color:#555; font-size:11px; font-weight:900;">
            <span>E</span><span>A</span><span>D</span><span>G</span><span>B</span><span>E</span>
        </div>
    </div>

    <div id="rhythm-view" class="rhythm-card" style="display:none;">
        <h2 style="margin:0; font-family:'Syncopate'; font-size:1rem; color:var(--primary); opacity:0.8;">PATRÓN RÍTMICO</h2>
        <div class="arrow-pattern" id="arrow-display">↓ ↓ ↑ ↑ ↓</div>
        <div class="metronome">
            <div class="beat-dot" id="b1"></div><div class="beat-dot" id="b2"></div><div class="beat-dot" id="b3"></div><div class="beat-dot" id="b4"></div>
        </div>
    </div>

    <div class="checklist-container">
        <h3 id="lesson-name" style="margin:0 0 10px 0; font-size:1.3rem; color:var(--primary);"></h3>
        <p id="lesson-desc" style="font-size:0.95rem; opacity:0.8; line-height:1.6; margin-bottom:20px;"></p>
        
        <div style="border-top: 1px solid #222; padding-top:15px;">
            <div class="check-item"><input type="checkbox"> <span>Ver clase completa</span></div>
            <div class="check-item"><input type="checkbox"> <span>Practicar técnica (10 min)</span></div>
            <div class="check-item"><input type="checkbox"> <span>Lograr cambio sin errores</span></div>
        </div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav">
    <div style="width: 100%; max-width: 400px; margin: 0 auto;">
        <button class="btn-main" onclick="nextLesson()">COMPLETAR Y CONTINUAR ✓</button>
    </div>
</div>

<script>
    const CLAVE = "GUITARRA1";
    let currentDay = 0;
    let beat = 0;

    // ESTRUCTURA DE 30 DÍAS SEGÚN RECOMENDACIONES
    const plan = [
        // Bloque 1: Básicos (1-5)
        { t: "La Mayor (A)", goal: "Tu primer acorde real", cat: "chord", p: ["X", 0, 2, 2, 2, 0], d: "Día 1: Coloca tus dedos 1, 2 y 3 en el traste 2 de las cuerdas 4, 3 y 2. La cuerda 1 debe sonar clara." },
        { t: "Re Mayor (D)", goal: "El triángulo de cristal", cat: "chord", p: ["X", "X", 0, 2, 3, 2], d: "Día 2: Forma un triángulo en los trastes 2 y 3. No toques las cuerdas gruesas." },
        { t: "Mi Mayor (E)", goal: "Poder y resonancia", cat: "chord", p: [0, 2, 2, 1, 0, 0], d: "Día 3: El acorde más potente. Asegúrate de que todas las cuerdas vibren sin miedos." },
        { t: "Cambio A - D", goal: "Fluidez motriz", cat: "chord", p: ["X", 0, 2, 2, 2, 0], d: "Día 4: Practica el salto entre La y Re. El objetivo es que no haya silencio entre el cambio." },
        { t: "Cambio E - A", goal: "Tu primer Rock", cat: "chord", p: [0, 2, 2, 1, 0, 0], d: "Día 5: Alterna entre Mi y La. ¡Felicidades, ya tienes tu primera semana!" },

        // Bloque 2: Mayores Completos (6-10)
        { t: "Sol Mayor (G)", goal: "Apertura máxima", cat: "chord", p: [3, 2, 0, 0, 3, 3], d: "Día 6: Usa los 4 dedos si puedes para un sonido más moderno y brillante." },
        { t: "Do Mayor (C)", goal: "La escalera armónica", cat: "chord", p: ["X", 3, 2, 0, 1, 0], d: "Día 7: No dejes que la palma toque el mástil, arquea bien los dedos." },
        { t: "Fa Mayor (F)", goal: "La temida Cejilla", cat: "chord", p: [1, 3, 3, 2, 1, 1], d: "Día 8: Presiona el índice plano. Es normal que cueste al principio, ¡no te rindas!" },
        { t: "Si Mayor (B)", goal: "Cejilla avanzada", cat: "chord", p: ["X", 2, 4, 4, 4, 2], d: "Día 9: Mantén el pulgar bajo para ganar fuerza en la pinza del índice." },
        { t: "Repaso Mayores", goal: "Consolidación total", cat: "chord", p: [3, 2, 0, 0, 3, 3], d: "Día 10: Toca todos los mayores en orden: C, D, E, F, G, A, B." }
    ];

    // Rellenamos Menores (11-15), Séptimos (16-20)
    for(let i=11; i<=15; i++) plan.push({ t: "Acorde Menor", goal: "Sentimiento y melancolía", cat: "chord", p: ["X", 0, 2, 2, 1, 0], d: `Día ${i}: Los acordes menores cambian el color de tu música. Practica la precisión.` });
    for(let i=16; i<=20; i++) plan.push({ t: "Séptimo Dominante", goal: "Tensión de Blues", cat: "chord", p: [0, 2, 0, 1, 0, 0], d: `Día ${i}: Aprende a generar tensión para resolver en acordes mayores.` });

    // Bloque Ritmos (21-25)
    plan.push({ t: "Ritmo Pop Básico", goal: "El pulso del mundo", cat: "rhythm", arr: "↓ ↓ ↑ ↑ ↓ ↑", d: "Día 21: Este ritmo sirve para el 80% de las canciones de radio. Relaja la muñeca." });
    plan.push({ t: "Ritmo Rock / Shuffle", goal: "Energía constante", cat: "rhythm", arr: "↓ ↓ ↓ ↑", d: "Día 22: Golpes hacia abajo con decisión. Siente el 'groove'." });
    plan.push({ t: "Balada Lenta", goal: "Control y suavidad", cat: "rhythm", arr: "↓ - ↓ ↑ ↓", d: "Día 23: Ideal para momentos acústicos. Toca con la yema del pulgar si quieres más suavidad." });
    plan.push({ t: "Muteo y Percusión", goal: "Técnica de mano derecha", cat: "rhythm", arr: "↓ X ↑ ↑ X", d: "Día 24: Usa la palma para 'apagar' las cuerdas y crear un sonido percusivo." });
    plan.push({ t: "Arpegio Base", goal: "Independencia de dedos", cat: "rhythm", arr: "P - I - M - A", d: "Día 25: Toca las cuerdas una por una. No uses púa hoy, solo tus dedos." });

    // Bloque Canciones (26-30)
    for(let i=26; i<=29; i++) plan.push({ t: "Canción de Aplicación", goal: "Música Real", cat: "song", arr: "C - G - Am - F", d: `Día ${i}: Aplica los acordes y el ritmo en esta secuencia clásica.` });
    plan.push({ t: "GRADUACIÓN ELITE", goal: "¡LO LOGRASTE!", cat: "song", arr: "CUALQUIER RITMO", d: "Día 30: Graba tu progreso y compártelo. Ya eres parte del 1% que no abandonó." });

    function render() {
        const d = plan[currentDay];
        const progress = ((currentDay + 1) / 30) * 100;
        
        // UI de Progreso
        document.getElementById('p-bar').style.width = `${progress}%`;
        document.getElementById('day-label').innerText = `DÍA ${currentDay + 1}`;
        document.getElementById('streak-val').innerText = currentDay + 1;
        document.getElementById('daily-goal').innerText = d.goal;
        document.getElementById('lesson-name').innerText = d.t;
        document.getElementById('lesson-desc').innerText = d.d;

        // Alternar Vistas (Mástil vs Ritmo)
        if(d.cat === 'chord') {
            document.getElementById('chord-view').style.display = 'flex';
            document.getElementById('rhythm-view').style.display = 'none';
            document.getElementById('chord-title').innerText = d.t;
            drawChord(d.p);
        } else {
            document.getElementById('chord-view').style.display = 'none';
            document.getElementById('rhythm-view').style.display = 'block';
            document.getElementById('arrow-display').innerText = d.arr || "↓ ↓ ↑ ↑ ↓";
        }

        // Resetar Checkbox
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function drawChord(p) {
        document.querySelectorAll('.finger, .status-mark').forEach(e => e.remove());
        p.forEach((val, i) => {
            const str = document.getElementById(`str${i}`);
            if (val === "X") str.innerHTML += `<span class="status-mark" style="color:#ef4444">X</span>`;
            else if (val === 0) str.innerHTML += `<span class="status-mark" style="color:var(--primary)">O</span>`;
            else if (typeof val === 'number') {
                const topPos = (val * 75) - 37;
                str.innerHTML += `<div class="finger" style="top:${topPos}px">${val}</div>`;
            }
        });
    }

    // Lógica Metrónomo
    setInterval(() => {
        document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active-beat'));
        beat = (beat % 4) + 1;
        const dot = document.getElementById(`b${beat}`);
        if(dot) dot.classList.add('active-beat');
    }, 600);

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === CLAVE) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
            document.getElementById('bottom-nav').style.display = 'block';
            render();
        } else {
            alert("CLAVE INCORRECTA");
        }
    }

    function nextLesson() {
        if(currentDay < plan.length - 1) {
            currentDay++;
            render();
        } else {
            alert("¡CURSO COMPLETADO! ERES UN GUITARRISTA ELITE.");
        }
    }
</script>
</body>
</html>
