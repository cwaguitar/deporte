<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cwa Guitar Academy</title>
    <style>
        :root { --primary: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #facc15; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        
        /* Pantalla de Acceso */
        #auth-screen { 
            max-width: 400px; width: 100%; text-align: center; margin-top: 50px; 
            background: var(--card); padding: 40px 20px; border-radius: 24px; border: 1px solid #334155;
        }
        .logo { font-size: 60px; margin-bottom: 10px; color: var(--primary); }
        input { width: 85%; padding: 15px; margin: 20px 0; border: 2px solid #334155; background: #0f172a; color: white; border-radius: 12px; font-size: 1em; text-align: center; }
        .btn-unlock { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; font-size: 1.1em; }
        
        /* Contenedor de la Academia */
        #app-content { display: none; max-width: 600px; width: 100%; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--primary); }
        .video-container iframe { width: 100%; height: 100%; border: none; }

        .card { background: var(--card); padding: 25px; border-radius: 24px; text-align: center; border: 1px solid #334155; }
        .day-badge { border: 1px solid var(--primary); color: var(--primary); padding: 6px 18px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        
        .lesson-list { list-style: none; padding: 0; text-align: left; margin: 20px 0; }
        .lesson-item { padding: 12px; background: #334155; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .controls { display: flex; justify-content: space-between; gap: 12px; margin-top: 25px; }
        .nav-btn { background: #334155; color: white; border: none; padding: 14px; border-radius: 14px; cursor: pointer; flex: 1; font-weight: bold; }
        .nav-btn:disabled { opacity: 0.3; }
        .nav-btn.next { background: var(--primary); color: black; }

        .tab-bar { display: flex; justify-content: space-around; background: var(--card); width: 100%; position: fixed; bottom: 0; padding: 15px 0; border-top: 1px solid #334155; }
        .tab-item { color: #94a3b8; font-size: 0.8em; text-decoration: none; text-align: center; }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo">🎸</div>
    <h2 style="color: white;">Cwa Guitar Academy</h2>
    <p style="color: #94a3b8;">Aprende un 1% cada día</p>
    <input type="text" id="pass-input" placeholder="Clave de Alumno">
    <button class="btn-unlock" id="unlock-button">ENTRAR A CLASE</button>
</div>

<div id="app-content">
    <header style="text-align: center; margin-bottom: 10px;">
        <h1 style="color: var(--primary); margin-bottom: 0;">Master Class</h1>
        <p id="lesson-module" style="color: #94a3b8; margin-top: 5px;">Módulo: Principiante</p>
    </header>

    <div class="video-container" id="media-box">
        <p style="color: #666;">Video de la lección</p>
    </div>

    <div class="card">
        <div id="day-label" class="day-badge">Lección 1</div>
        <h2 id="day-title" style="margin: 10px 0;">Cargando...</h2>
        
        <div class="lesson-list" id="exercise-list"></div>

        <div class="controls">
            <button class="nav-btn" id="prevBtn">Anterior</button>
            <button class="nav-btn next" id="nextBtn">Siguiente</button>
        </div>
    </div>
    <div style="height: 100px;"></div> </div>

<div class="tab-bar" id="bottom-nav" style="display:none;">
    <a href="#" class="tab-item active">🏠<br>Clases</a>
    <a href="#" class="tab-item">📖<br>Acordes</a>
    <a href="#" class="tab-item">📞<br>Soporte</a>
</div>

<script>
    const SECRET_KEY = "GUITARRA2024"; 
    let currentDay = 0;

    // Estructura del curso
    // IMPORTANTE: En 'video' pones el ID de YouTube (lo que va después de v=)
    const plan = [
        { 
            title: "Tu primer acorde: Mi Menor (Em)", 
            module: "Módulo 1: Iniciación",
            video: "https://www.youtube.com/embed/dQw4w9WgXcQ", // Reemplaza con tus links
            tasks: ["Coloca el dedo 2 en la 5ta cuerda", "Dedo 3 en la 4ta cuerda", "Ragueo hacia abajo 4 veces"],
            tip: "Usa la punta de los dedos, no las yemas." 
        },
        { 
            title: "El ritmo básico de Rock", 
            module: "Módulo 1: Iniciación",
            video: "https://www.youtube.com/embed/dQw4w9WgXcQ",
            tasks: ["Abajo, Abajo, Arriba, Arriba", "Mantén la muñeca relajada", "Practica a 60 BPM"],
            tip: "El metrónomo es tu mejor amigo." 
        },
        { 
            title: "Caminata de dedos", 
            module: "Módulo 2: Agilidad",
            video: "", 
            tasks: ["Dedo 1, 2, 3, 4 en traste 1", "Repetir en todas las cuerdas", "Sin que suenen ruidos"],
            tip: "No levantes los dedos más de 1cm de las cuerdas." 
        }
    ];

    function showApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('bottom-nav').style.display = 'flex';
        updateUI();
    }

    function updateUI() {
        const data = plan[currentDay];
        document.getElementById('day-label').innerText = `Clase ${currentDay + 1}`;
        document.getElementById('day-title').innerText = data.title;
        document.getElementById('lesson-module').innerText = data.module;
        
        // Cargar Video
        const mediaBox = document.getElementById('media-box');
        if(data.video) {
            mediaBox.innerHTML = `<iframe src="${data.video}" allowfullscreen></iframe>`;
        } else {
            mediaBox.innerHTML = `<p style="color: #64748b;">Lección técnica sin video</p>`;
        }
        
        const list = document.getElementById('exercise-list');
        list.innerHTML = "";
        data.tasks.forEach(t => {
            const div = document.createElement('div');
            div.className = "lesson-item";
            div.innerHTML = `<span>${t}</span> 🔘`;
            list.appendChild(div);
        });

        document.getElementById('prevBtn').disabled = (currentDay === 0);
        document.getElementById('nextBtn').disabled = (currentDay === plan.length - 1);
    }

    document.getElementById('unlock-button').onclick = function() {
        const userPass = document.getElementById('pass-input').value.trim().toUpperCase();
        if (userPass === SECRET_KEY) {
            localStorage.setItem('guitar_unlocked', 'true');
            showApp();
        } else {
            alert("Clave de alumno incorrecta");
        }
    };

    document.getElementById('prevBtn').onclick = () => { if(currentDay > 0) { currentDay--; updateUI(); } };
    document.getElementById('nextBtn').onclick = () => { if(currentDay < plan.length - 1) { currentDay++; updateUI(); } };

    window.onload = function() {
        if (localStorage.getItem('guitar_unlocked') === 'true') { showApp(); }
    };
</script>
</body>
</html>
